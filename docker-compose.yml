version: "3.7"

services:
  cotizador:
    image: ghcr.io/enzopittatori/cotizador_cideas:latest
    networks:
      - VpsNet
    environment:
      BASE_URL: ${BASE_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=VpsNet"
        - "traefik.http.routers.cotizador.rule=Host(`cotizador.sentidocomun.click`)"
        - "traefik.http.routers.cotizador.entrypoints=websecure"
        - "traefik.http.routers.cotizador.tls=true"
        - "traefik.http.routers.cotizador.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.cotizador.service=cotizador"
        - "traefik.http.services.cotizador.loadbalancer.server.port=3000"
        - "traefik.http.services.cotizador.loadbalancer.passHostHeader=true"

networks:
  VpsNet:
    external: true
